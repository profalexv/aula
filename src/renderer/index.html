<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula</title>
  <link rel="stylesheet" href="styles/app.css">
  <link rel="stylesheet" href="modules/auth/auth.css">
  <link rel="stylesheet" href="modules/usuarios/usuarios.css">
</head>
<body>

  <!-- Tela de Autenticação -->
  <div id="auth-screen" class="auth-screen">
    <!-- Conteúdo de autenticação será inserido aqui -->
  </div>

  <!-- Barra de abas no topo -->
  <header class="tab-bar" style="display: none;">
    <div class="app-logo">
      Aula
      <span class="app-school-name"></span>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-module="cronograma" title="Cronograma de Horários">
        📅 Cronograma
      </button>
      <button class="tab-btn" data-module="aula" title="Registro de Aulas">
        📝 Aula
      </button>
      <button class="tab-btn" data-module="usuarios" title="Gestão de Usuários">
        👥 Usuários
      </button>
      <div class="tab-bar-spacer"></div>
      <button class="tab-btn tab-btn-icon" data-module="licencas" title="Gerenciar Licenças">🔑</button>
    </nav>
  </header>

  <!-- Área de conteúdo dos módulos -->
  <main id="app-content" class="app-content" style="display: none;">
    <!-- Os módulos são carregados aqui dinamicamente -->
  </main>

  <!-- Toast de notificações -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Camada de autenticação -->
  <script src="modules/auth/auth.js"></script>
  
  <!-- Conteúdo HTML de autenticação -->
  <script>
    document.getElementById('auth-screen').innerHTML = `
      <div class="auth-overlay"></div>
      <div class="auth-container">
        <!-- Formulário de Login -->
        <form id="auth-login-form" class="auth-form" style="display: none;">
          <h1>Aula</h1>
          <p class="auth-subtitle" id="auth-school-name"></p>

          <div class="form-group">
            <label for="auth-login-username">Usuário</label>
            <input type="text" id="auth-login-username" name="username" required placeholder="Nome de usuário">
          </div>

          <div class="form-group">
            <label for="auth-login-password">Senha</label>
            <input type="password" id="auth-login-password" name="password" required placeholder="Sua senha">
          </div>

          <button type="submit" class="btn btn-primary" id="auth-login-btn">Entrar</button>

          <div class="auth-error" id="auth-login-error"></div>

          <p class="auth-footer">
            Sistema de Gestão Escolar - Aula
          </p>
        </form>

        <!-- Formulário de Primeiro Admin -->
        <form id="auth-register-form" class="auth-form" style="display: none;">
          <h1>Bem-vindo ao Aula</h1>
          <p class="auth-subtitle">Cadastro do primeiro administrador</p>

          <div class="form-group">
            <label for="auth-register-name">Nome completo</label>
            <input type="text" id="auth-register-name" name="name" required placeholder="Seu nome">
          </div>

          <div class="form-group">
            <label for="auth-register-username">Usuário</label>
            <input type="text" id="auth-register-username" name="username" required placeholder="Escolha um nome de usuário">
          </div>

          <div class="form-group">
            <label for="auth-register-password">Senha</label>
            <input type="password" id="auth-register-password" name="password" required 
              placeholder="Escolha uma senha segura (mín. 6 caracteres)">
          </div>

          <div class="form-group">
            <label for="auth-register-password-confirm">Confirmar senha</label>
            <input type="password" id="auth-register-password-confirm" name="password_confirm" required 
              placeholder="Confirme sua senha">
          </div>

          <button type="submit" class="btn btn-primary" id="auth-register-btn">Criar Administrador</button>

          <div class="auth-error" id="auth-register-error"></div>

          <p class="auth-footer">
            Sistema de Gestão Escolar - Aula
          </p>
        </form>

        <!-- Loading -->
        <div id="auth-loading" class="auth-loading" style="display: none;">
          <div class="spinner"></div>
          <p>Processando...</p>
        </div>
      </div>
    `;
  </script>

  <!-- Camada de dados e licenças (carregados antes dos módulos) -->
  <script src="data/data-provider.js"></script>
  <script src="data/license-client.js"></script>

  <!-- Scripts dos módulos -->
  <script src="modules/cronograma/cronograma.js"></script>
  <script src="modules/aula/aula.js"></script>
  <script src="modules/usuarios/usuarios.js"></script>

  <!-- Script principal -->
  <script src="app.js"></script>
</body>
</html>
